<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=Kaisei+Opti:wght@700&text=%E3%82%AD%E3%83%A9%E3%83%87%E3%82%B3%E3%83%A1%E3%83%BC%E3%82%AB%E3%83%BC&display=swap"
    />
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Yusei+Magic&display=swap" />
    <link rel="icon" type="image/jpeg" href="/logo.jpeg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="キラキラ写真を作ろう！キラデコメーカーで画像をデコれます。" />
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="キラデコメーカー" />
    <meta property="og:title" content="キラデコメーカー" />
    <meta property="og:description" content="キラキラ写真を作ろう！キラデコメーカーで画像をデコれます。" />
    <meta property="og:url" content="https://kurehajime.github.io/kiradeco_maker/" />
    <meta property="og:image" content="https://kurehajime.github.io/kiradeco_maker/ogp.jpeg" />
    <meta property="og:image:type" content="image/jpeg" />
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="キラデコメーカー" />
    <meta name="twitter:description" content="キラキラ写真を作ろう！キラデコメーカーで画像をデコれます。" />
    <meta name="twitter:image" content="https://kurehajime.github.io/kiradeco_maker/ogp.jpeg" />
    <title>キラデコメーカー</title>
  </head>
  <body>
    <div id="root"></div>
    <script>
      (() => {
        const langParam = new URLSearchParams(window.location.search).get('lang')?.toLowerCase()
        const selectedLang =
          langParam === 'ja' || langParam === 'en'
            ? langParam
            : navigator.language.toLowerCase().startsWith('ja')
              ? 'ja'
              : 'en'
        const isJapanese = selectedLang === 'ja'
        document.documentElement.lang = isJapanese ? 'ja' : 'en'
        document.title = isJapanese ? 'キラデコメーカー' : 'Kiradeco Maker'
      })()
    </script>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
